server:
  port: ${PORT:8080}
  shutdown: graceful

spring:
  application:
    name: multi-level-parking-system
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  mvc:
    problemdetails:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

info:
  app:
    name: Multi-Level Parking System
    description: Spring Boot API for parking operations, analytics, simulation, and allocator benchmarking
    version: 1.0.0
